<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title"></title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Cairo:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 id="heading"></h1>
        <p>Welcome to the JavaScript challenges section</p>
        <ul class="task-list">
            <li>Task 1</li>
            <li>Task 2</li>
        </ul>
    </div>

    <div class="container" id="task-1">
        <form action="">
            <label for="font-select">Font:</label>
            <select name="font" id="font-select">
                <option value="open-sans" selected>Open Sans</option>
                <option value="cairo">Cairo</option>
                <option value="roboto">Roboto</option>
            </select>

            <label for="color-select">Color:</label>
            <select name="color" id="color-select">
                <option value="#000000" selected>Black</option>
                <option value="#ffffff">White</option>
                <option value="#ff0000">Red</option>
                <option value="#0000ff">Blue</option>
                <option value="#008000">Green</option>
                <option value="#ffa500">Orange</option>
            </select>

            <label for="size-select">Font Size:</label>
            <select name="size" id="size-select">
                <option value="16" selected>16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
            </select>
        </form>
    </div>

    <div class="container" id="task-2">
        <form id="session-form" action="">
            <label for="input1">Input 1:</label>
            <input type="text" id="input1" name="input1">

            <label for="input2">Input 2:</label>
            <input type="text" id="input2" name="input2">

            <label for="input3">Input 3:</label>
            <input type="text" id="input3" name="input3">

            <label for="session-select">Choose:</label>
            <select id="session-select" name="session-select">
                <option value="opt1" selected>Option 1</option>
                <option value="opt2">Option 2</option>
                <option value="opt3">Option 3</option>
                <option value="opt4">Option 4</option>
                <option value="opt5">Option 5</option>
            </select>
        </form>
    </div>

    <script src="111-114.js"></script>
</body>
</html>
